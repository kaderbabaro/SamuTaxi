plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    // Le plugin Flutter doit être appliqué après Android et Kotlin
    id "dev.flutter.flutter-gradle-plugin"
    // Plugin Google Services pour Firebase
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"

android {
    namespace = "com.example.untitled1" // change ça si tu veux ton vrai package ex: com.arshtech.samutaxi
    compileSdk = 34
    ndkVersion = flutter.ndkVersion

    defaultConfig {
        applicationId = "com.example.untitled1"
        minSdk = 23
        targetSdk = 34
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildTypes {
        release {
            // TODO: ajouter ta signature plus tard
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
